name: native-floor

# The named toolchain lane for the universal SYNTAX floor (P2). The local build
# shell and the default `check.yml` runner have no node/ruby/php/go, so the
# non-execution / hermetic-env red-team proofs only `skipUnless` there. This lane
# installs every interpreter, HARD-ASSERTS each resolved (so a silently-missing
# toolchain fails the job instead of vacuously skipping the RCE-class net), and
# runs nativefloor + syntaxlens + the red-team suite against the REAL binaries.
# It is the regression net for the parse-only / no-execute guarantee.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  native-floor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Assert every toolchain resolved (fail, never skip)
        run: |
          python3 -c "import shutil,sys; sys.exit(0 if all(map(shutil.which,['node','ruby','php','gofmt','bash'])) else 1)"

      - name: Run the native syntax-floor suites against real interpreters
        run: |
          python3 -m unittest tests.test_nativefloor tests.test_syntaxlens tests.test_syntaxlens_redteam -v
